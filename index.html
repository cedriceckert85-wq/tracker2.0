<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

:root {
–bg: #0a0e17;
–bg-card: #111827;
–bg-hover: #1e293b;
–border: #1e293b;
–text: #e2e8f0;
–text-dim: #64748b;
–visited: #10b981;
–visited-glow: #10b98144;
–wantto: #f59e0b;
–wantto-glow: #f59e0b44;
–accent: #3b82f6;
–accent-glow: #3b82f644;
–land: #1e293b;
–land-stroke: #334155;
–sea: #0f172a;
–danger: #ef4444;
}

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘Outfit’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
overflow-x: hidden;
}

.app {
display: grid;
grid-template-columns: 300px 1fr;
grid-template-rows: auto 1fr;
min-height: 100vh;
}

header {
grid-column: 1 / -1;
padding: 20px 32px;
display: flex;
align-items: center;
justify-content: space-between;
border-bottom: 1px solid var(–border);
background: var(–bg-card);
}

header h1 {
font-family: ‘Space Mono’, monospace;
font-size: 1.4rem;
font-weight: 700;
letter-spacing: -0.5px;
}

header h1 span { color: var(–accent); }

.stats-bar {
display: flex;
gap: 24px;
font-size: 0.85rem;
}

.stat {
display: flex;
align-items: center;
gap: 8px;
}

.stat-dot {
width: 10px;
height: 10px;
border-radius: 50%;
}

.stat-dot.visited { background: var(–visited); box-shadow: 0 0 8px var(–visited-glow); }
.stat-dot.wantto { background: var(–wantto); box-shadow: 0 0 8px var(–wantto-glow); }

.stat-num {
font-family: ‘Space Mono’, monospace;
font-weight: 700;
font-size: 1rem;
}

/* Sidebar */
.sidebar {
background: var(–bg-card);
border-right: 1px solid var(–border);
padding: 20px;
overflow-y: auto;
display: flex;
flex-direction: column;
gap: 12px;
}

.user-row {
display: flex;
gap: 6px;
align-items: center;
}

.user-row select {
flex: 1;
background: var(–bg);
border: 1px solid var(–border);
border-radius: 8px;
padding: 8px 10px;
color: var(–text);
font-family: ‘Outfit’, sans-serif;
font-size: 0.85rem;
outline: none;
cursor: pointer;
appearance: auto;
}

.user-row select:focus { border-color: var(–accent); }

.user-row input {
width: 80px;
background: var(–bg);
border: 1px solid var(–border);
border-radius: 8px;
padding: 8px 10px;
color: var(–text);
font-family: ‘Outfit’, sans-serif;
font-size: 0.85rem;
outline: none;
}

.user-row input:focus { border-color: var(–accent); }
.user-row input::placeholder { color: var(–text-dim); }

.btn-delete {
background: var(–danger);
padding: 8px 10px;
font-size: 1rem;
line-height: 1;
}

.legend-inline {
display: flex;
gap: 14px;
padding: 8px 12px;
background: var(–bg);
border-radius: 8px;
border: 1px solid var(–border);
}

.legend-item {
display: flex;
align-items: center;
gap: 6px;
font-size: 0.75rem;
color: var(–text-dim);
white-space: nowrap;
}

.legend-swatch {
width: 16px;
height: 10px;
border-radius: 2px;
flex-shrink: 0;
}

.legend-swatch.visited { background: var(–visited); }
.legend-swatch.wantto { background: var(–wantto); }
.legend-swatch.both {
background: linear-gradient(90deg, var(–visited) 50%, var(–wantto) 50%);
}

.section-title {
font-size: 0.7rem;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 1.5px;
color: var(–text-dim);
margin-bottom: 8px;
}

.btn {
background: var(–accent);
color: white;
border: none;
border-radius: 8px;
padding: 8px 12px;
font-family: ‘Outfit’, sans-serif;
font-weight: 600;
font-size: 0.85rem;
cursor: pointer;
transition: all 0.2s;
white-space: nowrap;
}

.btn:hover { filter: brightness(1.15); transform: translateY(-1px); }

/* Country Dropdown */
.country-dropdown {
border: 1px solid var(–border);
border-radius: 8px;
overflow: hidden;
background: var(–bg);
}

.country-dropdown-toggle {
width: 100%;
display: flex;
align-items: center;
justify-content: space-between;
padding: 10px 12px;
background: var(–bg);
border: none;
color: var(–text);
font-family: ‘Outfit’, sans-serif;
font-size: 0.85rem;
font-weight: 500;
cursor: pointer;
transition: background 0.2s;
}

.country-dropdown-toggle:hover { background: var(–bg-hover); }

.chevron {
font-size: 0.75rem;
transition: transform 0.2s;
color: var(–text-dim);
}

.chevron.open { transform: rotate(180deg); }

.country-dropdown-content {
display: none;
flex-direction: column;
gap: 2px;
padding: 4px 6px 6px;
max-height: 250px;
overflow-y: auto;
border-top: 1px solid var(–border);
}

.country-dropdown-content.open {
display: flex;
}

.country-dropdown-content::-webkit-scrollbar { width: 4px; }
.country-dropdown-content::-webkit-scrollbar-track { background: transparent; }
.country-dropdown-content::-webkit-scrollbar-thumb { background: var(–border); border-radius: 2px; }

.country-tag {
display: flex;
align-items: center;
gap: 8px;
padding: 6px 10px;
border-radius: 6px;
font-size: 0.8rem;
background: var(–bg);
border: 1px solid var(–border);
}

.country-tag .dot {
width: 8px;
height: 8px;
border-radius: 50%;
flex-shrink: 0;
}

.country-tag .dot.visited { background: var(–visited); }
.country-tag .dot.wantto { background: var(–wantto); }

.country-tag .remove-country {
margin-left: auto;
background: none;
border: none;
color: var(–text-dim);
cursor: pointer;
font-size: 0.9rem;
padding: 0 4px;
opacity: 0;
transition: all 0.2s;
}

.country-tag:hover .remove-country { opacity: 1; }
.country-tag .remove-country:hover { color: var(–danger); }

/* Map */
.map-container {
position: relative;
overflow: hidden;
background: var(–sea);
}

#map {
width: 100%;
height: 100%;
}

.tooltip {
position: fixed;
pointer-events: none;
background: var(–bg-card);
border: 1px solid var(–border);
border-radius: 8px;
padding: 8px 14px;
font-size: 0.85rem;
font-weight: 500;
box-shadow: 0 8px 24px rgba(0,0,0,0.4);
z-index: 100;
opacity: 0;
transition: opacity 0.15s;
white-space: nowrap;
}

.tooltip.visible { opacity: 1; }

.tooltip-status {
font-size: 0.7rem;
color: var(–text-dim);
margin-top: 2px;
}

.tooltip-users {
font-size: 0.75rem;
margin-top: 4px;
display: flex;
flex-direction: column;
gap: 2px;
}

.tooltip-user-line {
display: flex;
align-items: center;
gap: 6px;
}

.tooltip-user-dot {
width: 6px;
height: 6px;
border-radius: 50%;
}

/* Zoom controls */
.zoom-controls {
position: absolute;
bottom: 20px;
right: 20px;
display: flex;
flex-direction: column;
gap: 4px;
}

.zoom-btn {
width: 36px;
height: 36px;
background: var(–bg-card);
border: 1px solid var(–border);
border-radius: 8px;
color: var(–text);
font-size: 1.2rem;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.2s;
}

.zoom-btn:hover { background: var(–bg-hover); border-color: var(–accent); }

@media (max-width: 768px) {
.app {
grid-template-columns: 1fr;
grid-template-rows: auto auto 60vh;
}
.sidebar {
max-height: 40vh;
border-right: none;
border-bottom: 1px solid var(–border);
}
}
</style>

</head>
<body>

<div class="app">
  <header>
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-dot visited"></div>
        <span>War da: <span class="stat-num" id="visitedCount">0</span></span>
      </div>
      <div class="stat">
        <div class="stat-dot wantto"></div>
        <span>Will hin: <span class="stat-num" id="wanttoCount">0</span></span>
      </div>
    </div>
  </header>

  <div class="sidebar">
    <div class="user-row">
      <select id="userSelect" onchange="selectUser(this.value)"></select>
      <input type="text" id="newUserInput" placeholder="Neu..." maxlength="20">
      <button class="btn" onclick="addUser()">+</button>
      <button class="btn btn-delete" id="deleteUserBtn" onclick="deleteActiveUser()" title="Benutzer löschen">&times;</button>
    </div>

  <div class="legend-item"><div class="legend-swatch visited"></div>War da</div>
  <div class="legend-item"><div class="legend-swatch both"></div>Beides</div>
</div>

<div class="country-dropdown">
  <button class="country-dropdown-toggle" id="countryToggle" onclick="toggleCountryList()">
    <span id="countryListTitle">Länder</span>
    <span class="chevron" id="chevron">&#9662;</span>
  </button>
  <div class="country-dropdown-content" id="countryList"></div>

  </div>

  <div class="map-container">
    <svg id="map"></svg>
    <div class="tooltip" id="tooltip"></div>
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoomIn()">+</button>
      <button class="zoom-btn" onclick="zoomOut()">−</button>
      <button class="zoom-btn" onclick="zoomReset()" style="font-size:0.7rem;">&#8634;</button>
    </div>
  </div>
</div>

<script>
// ─── State ───
const COLORS = [
  '#3b82f6','#8b5cf6','#ec4899','#06b6d4','#f97316',
  '#84cc16','#14b8a6','#e11d48','#6366f1','#eab308'
];

let state = {
  users: [],
  activeUserId: null
};

// ─── Storage ───
function save() {
  try {
    localStorage.setItem('travel-tracker', JSON.stringify(state));
  } catch(e) {}
}

function load() {
  try {
    const d = localStorage.getItem('travel-tracker');
    if (d) {
      state = JSON.parse(d);
      if (!state.users) state.users = [];
    }
  } catch(e) {}
}

// ─── User Management ───
function addUser() {
  const input = document.getElementById('newUserInput');
  const name = input.value.trim();
  if (!name) return;
  if (state.users.some(u => u.name.toLowerCase() === name.toLowerCase())) return;

  const user = {
    id: Date.now().toString(36),
    name,
    color: COLORS[state.users.length % COLORS.length],
    visited: [],
    wantto: []
  };

  state.users.push(user);
  state.activeUserId = user.id;
  input.value = '';
  save();
  renderAll();
}

function selectUser(id) {
  state.activeUserId = id;
  save();
  renderAll();
}

function getActiveUser() {
  return state.users.find(u => u.id === state.activeUserId) || null;
}

// ─── Map ───
const svg = d3.select('#map');
const g = svg.append('g');
const projection = d3.geoMercator().scale(150).translate([480, 320]);
const path = d3.geoPath().projection(projection);
const tooltip = document.getElementById('tooltip');

const zoom = d3.zoom()
  .scaleExtent([1, 12])
  .on('zoom', (e) => g.attr('transform', e.transform));

svg.call(zoom);

function zoomIn() { svg.transition().duration(300).call(zoom.scaleBy, 1.5); }
function zoomOut() { svg.transition().duration(300).call(zoom.scaleBy, 0.67); }
function zoomReset() { svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity); }

// Country name mapping
const NAME_MAP = {
  'United States of America': 'USA',
  'United Kingdom': 'UK',
  'Czech Republic': 'Tschechien',
  'Czechia': 'Tschechien',
};

let worldData = null;

async function loadMap() {
  const resp = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
  const world = await resp.json();
  worldData = topojson.feature(world, world.objects.countries);

  g.append('g')
    .selectAll('path')
    .data(worldData.features)
    .enter()
    .append('path')
    .attr('d', path)
    .attr('class', 'country')
    .attr('fill', 'var(--land)')
    .attr('stroke', 'var(--land-stroke)')
    .attr('stroke-width', 0.5)
    .style('cursor', 'pointer')
    .style('transition', 'fill 0.2s')
    .on('click', (e, d) => handleCountryClick(d))
    .on('mouseover', (e, d) => showTooltip(e, d))
    .on('mousemove', (e) => moveTooltip(e))
    .on('mouseout', hideTooltip);

  // Initial data
  load();
  if (!state.users.length) {
    // Pre-populate with Cedric's data
    const cedric = {
      id: 'cedric',
      name: 'Cedric',
      color: COLORS[0],
      visited: ['Malta','Cyprus','Italy','Austria','Indonesia','Estonia','Japan','Taiwan','Portugal','Spain','France'],
      wantto: ['Thailand','Croatia','Greece','South Korea','Iceland']
    };
    state.users.push(cedric);
    state.activeUserId = 'cedric';
    save();
  }
  renderAll();

  // Resize
  const resize = () => {
    const container = document.querySelector('.map-container');
    const w = container.clientWidth;
    const h = container.clientHeight;
    svg.attr('viewBox', `0 0 ${Math.max(w, 960)} ${Math.max(h, 600)}`);
  };
  resize();
  window.addEventListener('resize', resize);
}

function handleCountryClick(d) {
  const user = getActiveUser();
  if (!user) { alert('Bitte zuerst einen Benutzer anlegen!'); return; }

  const name = d.properties.name;
  const inWantto = user.wantto.includes(name);
  const inVisited = user.visited.includes(name);

  if (!inWantto && !inVisited) {
    // Click 1: → will hin
    user.wantto.push(name);
  } else if (inWantto) {
    // Click 2: will hin → war da
    user.wantto.splice(user.wantto.indexOf(name), 1);
    user.visited.push(name);
  } else if (inVisited) {
    // Click 3: war da → weg
    user.visited.splice(user.visited.indexOf(name), 1);
  }

  save();
  renderAll();
}

function getCountryStatus(name) {
  const result = { visitedBy: [], wanttoBy: [] };
  state.users.forEach(u => {
    if (u.visited.includes(name)) result.visitedBy.push(u);
    if (u.wantto.includes(name)) result.wanttoBy.push(u);
  });
  return result;
}

function showTooltip(e, d) {
  const name = d.properties.name;
  const status = getCountryStatus(name);

  let html = `<strong>${name}</strong>`;

  if (status.visitedBy.length || status.wanttoBy.length) {
    html += '<div class="tooltip-users">';
    status.visitedBy.forEach(u => {
      html += `<div class="tooltip-user-line">
        <div class="tooltip-user-dot" style="background:var(--visited)"></div>
        ${u.name} — war da
      </div>`;
    });
    status.wanttoBy.forEach(u => {
      html += `<div class="tooltip-user-line">
        <div class="tooltip-user-dot" style="background:var(--wantto)"></div>
        ${u.name} — will hin
      </div>`;
    });
    html += '</div>';
  } else {
    html += '<div class="tooltip-status">Nicht markiert</div>';
  }

  tooltip.innerHTML = html;
  tooltip.classList.add('visible');
  moveTooltip(e);
}

function moveTooltip(e) {
  tooltip.style.left = (e.clientX + 16) + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

// ─── Render ───
function renderAll() {
  renderUsers();
  renderMap();
  renderCountryList();
  renderStats();
}

function renderUsers() {
  const sel = document.getElementById('userSelect');
  sel.innerHTML = state.users.map(u => {
    const total = u.visited.length + u.wantto.length;
    const selected = u.id === state.activeUserId ? 'selected' : '';
    return `<option value="${u.id}" ${selected}>${u.name} (${total})</option>`;
  }).join('');
  if (!state.users.length) {
    sel.innerHTML = '<option value="">— Kein Benutzer —</option>';
  }
  document.getElementById('deleteUserBtn').style.display = state.users.length ? '' : 'none';
}

function deleteActiveUser() {
  const user = getActiveUser();
  if (!user) return;
  if (!confirm(`"${user.name}" wirklich löschen?`)) return;
  state.users = state.users.filter(u => u.id !== user.id);
  state.activeUserId = state.users.length ? state.users[0].id : null;
  save();
  renderAll();
}

function renderMap() {
  g.selectAll('.country')
    .attr('fill', function(d) {
      const name = d.properties.name;
      const status = getCountryStatus(name);

      if (status.visitedBy.length && status.wanttoBy.length) {
        return '#0d9488'; // teal for both
      } else if (status.visitedBy.length) {
        return 'var(--visited)';
      } else if (status.wanttoBy.length) {
        return 'var(--wantto)';
      }
      return 'var(--land)';
    })
    .attr('stroke-width', function(d) {
      const name = d.properties.name;
      const status = getCountryStatus(name);
      return (status.visitedBy.length || status.wanttoBy.length) ? 1 : 0.5;
    });
}

function toggleCountryList() {
  const content = document.getElementById('countryList');
  const chevron = document.getElementById('chevron');
  content.classList.toggle('open');
  chevron.classList.toggle('open');
}

function renderCountryList() {
  const user = getActiveUser();
  const title = document.getElementById('countryListTitle');
  const list = document.getElementById('countryList');

  if (!user) {
    title.textContent = 'Länder (0)';
    list.innerHTML = '';
    return;
  }

  const items = [
    ...user.wantto.sort().map(c => ({ name: c, type: 'wantto' })),
    ...user.visited.sort().map(c => ({ name: c, type: 'visited' }))
  ];

  title.textContent = `${user.name} — ${items.length} Länder`;

  if (!items.length) {
    list.innerHTML = '<div style="color:var(--text-dim);font-size:0.8rem;padding:8px;">Klicke auf Länder in der Karte</div>';
    return;
  }

  list.innerHTML = items.map(item => `
    <div class="country-tag">
      <div class="dot ${item.type}"></div>
      <span>${item.name}</span>
      <button class="remove-country" onclick="removeCountry('${item.name}','${item.type}')" title="Entfernen">&times;</button>
    </div>
  `).join('');
}

function removeCountry(name, type) {
  const user = getActiveUser();
  if (!user) return;
  const idx = user[type].indexOf(name);
  if (idx > -1) user[type].splice(idx, 1);
  save();
  renderAll();
}

function renderStats() {
  const user = getActiveUser();
  document.getElementById('visitedCount').textContent = user ? user.visited.length : 0;
  document.getElementById('wanttoCount').textContent = user ? user.wantto.length : 0;
}

// ─── Init ───
document.getElementById('newUserInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addUser();
});

loadMap();
</script>

</body>
</html>
